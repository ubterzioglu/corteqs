# ==========================================
# CorteQS - Coolify Docker Compose
# ==========================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_APP_NAME=${VITE_APP_NAME:-CorteQS}
        - VITE_APP_VERSION=${VITE_APP_VERSION:-1.0.0}
    container_name: corteqs-app
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - corteqs-network
    # Coolify specific labels
    labels:
      - "coolify.managed=true"
      - "coolify.service=app"

networks:
  corteqs-network:
    driver: bridge
